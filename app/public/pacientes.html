<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes — ClinicaMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="d-flex">
    <nav class="sidebar">
        <div class="sidebar-header"><a href="/index.html" class="sidebar-logo"><i class="fas fa-heartbeat"></i> ClinicaMS</a></div>
        <div class="sidebar-nav">
            <a href="/dashboard.html" class="nav-link" data-page="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
            <div class="sidebar-section">Cadastros</div>
            <a href="/pacientes.html" class="nav-link" data-page="pacientes"><i class="fas fa-user-injured"></i> Pacientes</a>
            <a href="/medicos.html" class="nav-link" data-page="medicos"><i class="fas fa-user-md"></i> Médicos</a>
            <div class="sidebar-section">Agenda</div>
            <a href="/consultas.html" class="nav-link" data-page="consultas"><i class="fas fa-calendar-alt"></i> Consultas</a>
            <a href="/relatorio.html" class="nav-link" data-page="relatorio"><i class="fas fa-chart-bar"></i> Relatórios</a>
            <div class="sidebar-section">Outros</div>
            <a href="/contato.html" class="nav-link" data-page="contato"><i class="fas fa-envelope"></i> Contato</a>
        </div>
        <div class="sidebar-footer"><button class="btn-logout" id="btnLogout"><i class="fas fa-sign-out-alt"></i> Sair</button></div>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <span class="topbar-title"><i class="fas fa-user-injured" style="color:#0EA5E9;"></i> Pacientes</span>
            <div class="topbar-user"><div class="avatar" id="userAvatar">A</div><span id="userName"></span></div>
        </header>
        <div class="content-area">
            <div class="page-header">
                <h1>Gerenciar Pacientes</h1>
                <button class="btn btn-primary" onclick="openNew()"><i class="fas fa-user-plus"></i> Novo Paciente</button>
            </div>
            <div id="alertMain"></div>
            <div class="table-container">
                <div class="table-toolbar">
                    <h2>Lista de Pacientes <span class="badge badge-info" id="countBadge">0</span></h2>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" class="form-control" id="searchInput" placeholder="Buscar por nome, CPF ou e-mail..." style="width:280px;" oninput="debounceSearch()">
                    </div>
                </div>
                <div class="table-overflow">
                    <table>
                        <thead>
                            <tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>E-mail</th><th>Nascimento</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h3 id="modalTitle">Novo Paciente</h3>
            <button class="modal-close" onclick="closeModal('modal')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div id="alertModal"></div>
            <form id="form">
                <input type="hidden" id="pacienteId">
                <div class="form-row-2">
                    <div class="form-group" style="grid-column:1/-1;">
                        <label>Nome Completo *</label>
                        <input type="text" class="form-control" id="nome" placeholder="Nome do paciente" required>
                    </div>
                    <div class="form-group">
                        <label>CPF *</label>
                        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" class="form-control" id="telefone" placeholder="(00) 00000-0000" maxlength="20">
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" class="form-control" id="email" placeholder="email@exemplo.com">
                    </div>
                    <div class="form-group">
                        <label>Data de Nascimento</label>
                        <input type="date" class="form-control" id="dataNascimento">
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('modal')">Cancelar</button>
            <button class="btn btn-primary" id="btnSave" onclick="save()"><i class="fas fa-save"></i> Salvar</button>
        </div>
    </div>
</div>

<!-- DELETE CONFIRM -->
<div class="modal-overlay" id="modalDel">
    <div class="modal-box" style="max-width:420px;">
        <div class="modal-header">
            <h3>Confirmar Exclusão</h3>
            <button class="modal-close" onclick="closeModal('modalDel')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <p>Deseja remover o paciente <strong id="delName"></strong>? Esta ação não pode ser desfeita.</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('modalDel')">Cancelar</button>
            <button class="btn btn-danger" id="btnDel" onclick="confirmDelete()"><i class="fas fa-trash"></i> Remover</button>
        </div>
    </div>
</div>

<script src="/js/common.js"></script>
<script>
let pacientes = [], delId = null, searchTimer;

async function load(search = '') {
    const url = search ? `/api/pacientes?search=${encodeURIComponent(search)}` : '/api/pacientes';
    pacientes = await apiFetch(url);
    render();
}

function render() {
    document.getElementById('countBadge').textContent = pacientes.length;
    const tbody = document.getElementById('tableBody');
    if (pacientes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><i class="fas fa-users"></i><p>Nenhum paciente encontrado.</p></div></td></tr>';
        return;
    }
    tbody.innerHTML = pacientes.map(p => `
        <tr>
            <td><strong>${p.nome}</strong></td>
            <td><code style="font-size:.8rem;">${p.cpf}</code></td>
            <td>${p.telefone || '<span class="text-muted">-</span>'}</td>
            <td>${p.email || '<span class="text-muted">-</span>'}</td>
            <td>${formatDate(p.data_nascimento)}</td>
            <td>
                <button class="btn btn-edit btn-sm" onclick="edit(${p.id_paciente})"><i class="fas fa-edit"></i> Editar</button>
                <button class="btn btn-danger btn-sm" onclick="del(${p.id_paciente}, '${p.nome.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function openNew() {
    document.getElementById('form').reset();
    document.getElementById('pacienteId').value = '';
    document.getElementById('modalTitle').textContent = 'Novo Paciente';
    clearAlert('alertModal');
    openModal('modal');
}

async function edit(id) {
    const p = await apiFetch(`/api/pacientes/${id}`);
    document.getElementById('pacienteId').value = p.id_paciente;
    document.getElementById('nome').value = p.nome;
    document.getElementById('cpf').value = p.cpf;
    document.getElementById('telefone').value = p.telefone || '';
    document.getElementById('email').value = p.email || '';
    document.getElementById('dataNascimento').value = p.data_nascimento || '';
    document.getElementById('modalTitle').textContent = 'Editar Paciente';
    clearAlert('alertModal');
    openModal('modal');
}

async function save() {
    const id = document.getElementById('pacienteId').value;
    const body = {
        nome: document.getElementById('nome').value,
        cpf: document.getElementById('cpf').value,
        telefone: document.getElementById('telefone').value,
        email: document.getElementById('email').value,
        data_nascimento: document.getElementById('dataNascimento').value
    };
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    try {
        if (id) await apiFetch(`/api/pacientes/${id}`, { method: 'PUT', body: JSON.stringify(body) });
        else     await apiFetch('/api/pacientes', { method: 'POST', body: JSON.stringify(body) });
        closeModal('modal');
        showAlert('alertMain', id ? 'Paciente atualizado com sucesso!' : 'Paciente cadastrado com sucesso!', 'success');
        load();
    } catch(e) {
        showAlert('alertModal', e.message, 'error');
    }
    btn.disabled = false;
}

function del(id, name) {
    delId = id;
    document.getElementById('delName').textContent = name;
    openModal('modalDel');
}

async function confirmDelete() {
    const btn = document.getElementById('btnDel');
    btn.disabled = true;
    try {
        await apiFetch(`/api/pacientes/${delId}`, { method: 'DELETE' });
        closeModal('modalDel');
        showAlert('alertMain', 'Paciente removido com sucesso!', 'success');
        load();
    } catch(e) {
        closeModal('modalDel');
        showAlert('alertMain', e.message, 'error');
    }
    btn.disabled = false;
}

function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => load(document.getElementById('searchInput').value), 350);
}

// CPF mask
document.getElementById('cpf').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'').substring(0,11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d+)/,'$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d+)/,'$1.$2');
    this.value = v;
});

initPage('pacientes').then(() => load());
</script>
</body>
</html>
